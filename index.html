<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sistema de gestión de turnos de aseo semanal para un grupo de 22 integrantes. Asignación aleatoria por día, control de ausencias y reemplazos automáticos." />
  <meta name="theme-color" content="#0d0e14" />

  <title>Aseo Grupo — Gestión de Turnos Semanales</title>

  <!-- Open Graph -->
  <meta property="og:title" content="Aseo Grupo — Gestión de Turnos" />
  <meta property="og:description" content="Gestión de turnos de aseo para el grupo de 22 integrantes." />
  <meta property="og:type" content="website" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="app-wrapper">

    <!-- ─── HEADER ──────────────────────────────────────────── -->
    <header class="app-header" role="banner">
      <div class="header-inner">

        <div class="brand">
          <div class="brand-icon" aria-hidden="true">🧹</div>
          <div class="brand-text">
            <h1>Aseo Grupo</h1>
            <p class="subtitle">Gestión de turnos semanales</p>
          </div>
        </div>

        <div class="header-actions">
          <div id="semana-display" aria-live="polite" aria-label="Semana actual">
            <span class="semana-badge">📅 Cargando…</span>
          </div>

          <button
            id="btn-nueva-semana"
            class="btn btn--primary"
            type="button"
            aria-label="Generar nueva distribución aleatoria para esta semana"
          >
            🔀 Nueva semana
          </button>

          <button
            id="btn-reset"
            class="btn btn--danger"
            type="button"
            aria-label="Reiniciar completamente el estado"
          >
            ↺ Reset
          </button>
        </div>

      </div>
    </header>

    <!-- ─── MAIN ─────────────────────────────────────────────── -->
    <main class="app-main" id="main-content" role="main">

      <!-- Leyenda de estados -->
      <section class="leyenda" aria-label="Leyenda de estados">
        <span class="leyenda-titulo">Leyenda</span>
        <div class="leyenda-item">
          <span class="leyenda-dot leyenda-dot--activo" aria-hidden="true"></span>
          <span>Activo — turno asignado</span>
        </div>
        <div class="leyenda-item">
          <span class="leyenda-dot leyenda-dot--ausente" aria-hidden="true"></span>
          <span>Ausente — faltante del día</span>
        </div>
        <div class="leyenda-item">
          <span class="leyenda-dot leyenda-dot--reemplazo" aria-hidden="true"></span>
          <span>Reemplazo — cubre la ausencia</span>
        </div>
      </section>

      <!-- Estadísticas rápidas -->
      <div class="stats-bar" id="stats-bar" aria-label="Resumen del estado actual">
        <div class="stat-chip">
          👥 <strong>22</strong> integrantes
        </div>
        <div class="stat-chip">
          📆 <strong>5</strong> días activos
        </div>
      </div>

      <!-- Contenedor de grupos — renderizado dinámicamente por render.js -->
      <section
        id="grupos-container"
        aria-label="Grupos de aseo por día de la semana"
        aria-live="polite"
      >
        <!-- Estado inicial / loading -->
        <div class="estado-vacio">
          <div class="estado-vacio-icono">🧹</div>
          <p>Cargando distribución…</p>
        </div>
      </section>

    </main>

    <!-- ─── FOOTER ────────────────────────────────────────────── -->
    <footer class="app-footer" role="contentinfo">
      <p>Sistema de Aseo Grupal &mdash; Datos persistidos localmente &bull; Sin conexión requerida</p>
    </footer>

  </div><!-- /.app-wrapper -->

  <!-- Toast de notificaciones -->
  <div
    id="toast"
    class="toast"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  ></div>

  <!-- Entry point del módulo ES6 -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
